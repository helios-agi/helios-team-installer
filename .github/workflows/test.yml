# =============================================================================
# test.yml — GitHub Actions CI for helios-team-installer
# =============================================================================
# Jobs:
#   1. shellcheck     — lint all shell scripts
#   2. bats-ubuntu    — run BATS tests on Ubuntu
#   3. bats-macos     — run BATS tests on macOS
#   4. tarball-audit  — validate tarball structure (placeholder)
# =============================================================================

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:

  # ─── Job 1: ShellCheck ──────────────────────────────────────────────────────
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        run: |
          shellcheck -S warning \
            -e SC2034 -e SC1090 -e SC1091 -e SC2155 -e SC2088 \
            -e SC2015 -e SC2129 -e SC2126 -e SC2086 \
            install.sh build-release.sh verify.sh uninstall.sh \
            sync-from-agent.sh bootstrap.sh

  # ─── Job 2: BATS on Ubuntu ──────────────────────────────────────────────────
  bats-ubuntu:
    name: BATS tests (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install BATS
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats

      - name: Run unit tests
        run: bats --tap tests/unit_tests.bats

      - name: Run tarball audit (skips if no tarball)
        run: bats --tap tests/tarball_audit.bats

  # ─── Job 3: BATS on macOS ───────────────────────────────────────────────────
  bats-macos:
    name: BATS tests (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install BATS
        run: brew install bats-core

      - name: Run unit tests
        run: bats --tap tests/unit_tests.bats

      - name: Run tarball audit (skips if no tarball)
        run: bats --tap tests/tarball_audit.bats

  # ─── Job 4: Tarball Audit (placeholder) ─────────────────────────────────────
  tarball-audit:
    name: Tarball audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Info
        run: |
          echo "Tarball audit tests run in bats-ubuntu/bats-macos jobs."
          echo "Tests auto-skip when no tarball is present in dist/."
          echo "For full audit: ./build-release.sh <version> && bats tests/tarball_audit.bats"

  # ─── Job 5: Windows PowerShell Syntax Check ─────────────────────────────────
  windows-syntax:
    name: Windows installer syntax
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: PowerShell syntax check (install.ps1)
        shell: pwsh
        run: |
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            "$PWD/install.ps1", [ref]$null, [ref]$errors
          )
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }
          Write-Host "install.ps1 — no syntax errors"

      - name: Batch file syntax check (install.bat)
        shell: cmd
        run: |
          REM Basic syntax validation — check for common errors
          findstr /n "wsl.*wsl" install.bat && (
            echo ERROR: Double wsl invocation detected in install.bat
            exit /b 1
          )
          echo install.bat — no double-invocation patterns found

      - name: Anti-regression — no unquoted bash -c wsl patterns
        shell: bash
        run: |
          echo "Checking for 'bash -c wsl' anti-pattern..."
          if grep -n "bash -c wsl" install.ps1 install.bat 2>/dev/null; then
            echo "ERROR: Found 'bash -c wsl' pattern — this causes 'command not found' inside WSL"
            exit 1
          fi
          echo "No anti-patterns found ✓"
