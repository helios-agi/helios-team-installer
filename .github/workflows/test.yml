# =============================================================================
# test.yml — GitHub Actions CI for helios-team-installer
# =============================================================================
# Jobs:
#   1. shellcheck     — lint all shell scripts (ubuntu-latest)
#   2. bats-ubuntu    — run BATS tests on Ubuntu with Python 3.12
#   3. bats-macos     — run BATS tests on macOS (brew install bats-core)
#   4. tarball-audit  — validate helios-agent tarball structure (placeholder)
# =============================================================================

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:

  # ─── Job 1: ShellCheck ──────────────────────────────────────────────────────
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          # Ignore: SC2034 (unused vars), SC1090/SC1091 (dynamic source),
          #         SC2155 (declare and assign separately)
          ignore_errorcode: "SC2034 SC1090 SC1091 SC2155"
          scandir: "."
          # Check all .sh files, including those without extensions
          additional_files: "install.sh bootstrap.sh verify.sh uninstall.sh sync-from-agent.sh build-release.sh"

  # ─── Job 2: BATS on Ubuntu ──────────────────────────────────────────────────
  bats-ubuntu:
    name: BATS tests (Ubuntu)
    runs-on: ubuntu-latest
    needs: shellcheck

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Run BATS test suite
        uses: bats-core/bats-action@3.0.0
        with:
          tests: tests/
          arguments: "--recursive --tap"

  # ─── Job 3: BATS on macOS ───────────────────────────────────────────────────
  bats-macos:
    name: BATS tests (macOS)
    runs-on: macos-latest
    needs: shellcheck

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install bats-core via Homebrew
        run: brew install bats-core

      - name: Run BATS test suite
        run: bats --recursive --tap tests/

  # ─── Job 4: Tarball Audit (placeholder — needs helios-agent source) ─────────
