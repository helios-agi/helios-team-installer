name: npm Package Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-test:
    name: npm smoke (${{ matrix.os }}, node ${{ matrix.node }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    timeout-minutes: 10
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install @helios-agent/cli
        run: |
          npm install -g @helios-agent/cli
          export PATH="$(npm prefix -g)/bin:$PATH"
          echo "PATH=$(npm prefix -g)/bin:$PATH" >> $GITHUB_ENV

      - name: Verify binary exists
        run: |
          which helios || { echo "FAIL: helios not in PATH"; exit 1; }
          echo "✓ helios binary found at $(which helios)"

      - name: Verify --version
        run: |
          VERSION=$(helios --version 2>&1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "✓ helios version: $VERSION"
          [ -n "$VERSION" ] || { echo "FAIL: no version output"; exit 1; }

      - name: Verify --help runs
        run: helios --help 2>&1 | head -10 || true
